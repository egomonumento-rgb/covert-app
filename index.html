<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covert - Invisible Messaging</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="COVERT">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link class="apple-touch-icon" rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body id="app-body" class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col justify-between font-sans selection:bg-zinc-700 transition-colors duration-200">

    <header id="app-header" class="border-b border-zinc-800 p-4 bg-zinc-900/50 backdrop-blur sticky top-0 z-50 transition-colors duration-200">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <svg id="logo-icon" class="w-6 h-6 text-white transition-colors duration-200" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
                <h1 id="brand-title" class="text-xl font-black tracking-wider text-white transition-colors duration-200">COVERT</h1>
            </div>
            
            <div class="flex items-center space-x-2">
                <button id="theme-toggle" onclick="toggleTheme()" class="text-sm bg-zinc-800 text-zinc-300 p-1.5 rounded-lg border border-zinc-700 hover:bg-zinc-700 transition active:scale-95">
                    🌙
                </button>
                <span id="badge-version" class="text-xs bg-zinc-800 text-zinc-400 px-2 py-1 rounded border border-zinc-700 transition-colors duration-200">v2.0</span>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-5">
        
        <div id="tab-container" class="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800 transition-colors duration-200">
            <button id="btn-tab-cifrar" class="w-1/2 py-2.5 text-sm font-semibold rounded-lg bg-zinc-800 text-white transition shadow" onclick="switchTab('cifrar')">
                Ocultar Mensaje
            </button>
            <button id="btn-tab-descifrar" class="w-1/2 py-2.5 text-sm font-semibold rounded-lg text-zinc-400 hover:text-zinc-500 transition" onclick="switchTab('descifrar')">
                Revelar Mensaje
            </button>
        </div>

        <div id="panel-password" class="bg-zinc-900/40 border border-zinc-800 p-3 rounded-xl space-y-1.5 transition-colors duration-200">
            <label id="label-password" class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500">Contraseña del Chat (Llave Privada)</label>
            <input id="chat-password" type="password" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-sm focus:outline-none focus:border-zinc-500 text-zinc-300 font-mono transition-colors duration-200" placeholder="Ej: clave_secreta_2026">
        </div>

        <section id="section-cifrar" class="space-y-4">
            <div>
                <label id="label-mensaje-real" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Mensaje Real y Secreto</label>
                <textarea id="mensaje-real" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-500 resize-none text-zinc-300 placeholder-zinc-700 transition-colors duration-200" placeholder="Escribe el mensaje confidencial aquí..."></textarea>
            </div>

            <div class="space-y-2">
                <label id="label-contexto" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400">Selecciona Frase de Fachada</label>
                <div id="cat-container" class="flex space-x-1.5 bg-zinc-900 p-1 rounded-lg border border-zinc-800 overflow-x-auto transition-colors duration-200">
                    <button onclick="renderFrases('obra')" id="cat-obra" class="cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md bg-zinc-800 text-white whitespace-nowrap">🏗️ Obra</button>
                    <button onclick="renderFrases('logistica')" id="cat-logistica" class="cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md text-zinc-400 hover:text-zinc-500 whitespace-nowrap">🚗 Camino</button>
                    <button onclick="renderFrases('cotidiano')" id="cat-cotidiano" class="cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md text-zinc-400 hover:text-zinc-500 whitespace-nowrap">🛒 Cotidiano</button>
                </div>
                
                <div id="frases-container" class="grid grid-cols-1 gap-2 pt-1 max-h-48 overflow-y-auto">
                    </div>
            </div>

            <div id="resultado-cifrado-container" class="hidden space-y-2 pt-2">
                <label id="label-resultado-cifrado" class="block text-xs font-semibold uppercase tracking-wider text-zinc-500">Texto generado (El secreto ya está invisible adentro)</label>
                <div id="panel-resultado-cifrado" class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 space-y-3 transition-colors duration-200">
                    <p id="resultado-cifrado-texto" class="bg-zinc-950 p-3 rounded-lg border border-zinc-800 text-sm text-zinc-300 break-words font-sans transition-colors duration-200"></p>
                    <button id="btn-copiar-master" onclick="copiarAlPortapapeles()" class="w-full bg-white text-black font-bold text-xs py-2.5 rounded-lg hover:bg-zinc-200 transition shadow">
                        Copiar Mensaje Listo para WhatsApp
                    </button>
                </div>
            </div>
        </section>

        <section id="section-descifrar" class="hidden space-y-4">
            <div>
                <label id="label-mensaje-camuflado" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Pegar Mensaje de WhatsApp</label>
                <textarea id="texto-camuflado-input" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-500 resize-none text-zinc-300 placeholder-zinc-700 transition-colors duration-200" placeholder="Pega el texto de la fachada tal cual como llegó..."></textarea>
            </div>

            <button id="btn-revelar-master" onclick="procesarDescifrado()" class="w-full bg-zinc-800 text-white border border-zinc-700 font-semibold text-sm py-3 rounded-xl hover:bg-zinc-700 transition shadow">
                Extraer y Revelar Mensaje Oculto
            </button>

            <div id="resultado-descifrar-container" class="hidden space-y-2 pt-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-emerald-500">⚠️ MENSAJE REVELADO</label>
                <div id="panel-resultado-descifrar" class="bg-emerald-950/20 border border-emerald-900/40 rounded-xl p-4 text-sm text-emerald-400 break-words transition-colors duration-200">
                    <p id="resultado-descifrar-texto" class="font-medium tracking-wide"></p>
                </div>
            </div>
        </section>

    </main>

    <footer id="app-footer" class="p-4 text-center text-zinc-600 text-[10px] border-t border-zinc-900 tracking-wider uppercase transition-colors duration-200">
        Covert Labs v2.0 &bull; Cifrado Criptográfico Esteganográfico Local Activo
    </footer>

    <script>
        // Configuración de temas y respuestas optimizadas
        const FACHADAS_TEMAS = {
            obra: [
                "Dale, ya reviso el plano y te aviso.",
                "Mañana a primera hora cuadramos con el maestro.",
                "Ya salieron los precios unitarios, te los paso en la tarde.",
                "Quedo atento a la confirmación del proveedor.",
                "Ya voy saliendo para la visita técnica."
            ],
            logistica: [
                "Ya voy llegando al sitio.",
                "Qué pena la demora, me agarró el trancón de siempre.",
                "Voy manejando, apenas llegue te pego una timbrada.",
                "Ya pasé por el punto, todo normal.",
                "Voy en camino, nos vemos en 15."
            ],
            cotidiano: [
                "Listo, ya voy para allá con el pan y la leche.",
                "Dale, nos vemos allá más tarde.",
                "Ok, anotado.",
                "Ya almorcé, voy de salida.",
                "¿Al fin qué hacemos con lo de la cena?"
            ]
        };

        let currentCategory = 'obra';
