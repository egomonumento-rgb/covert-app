<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covert - Encrypted Messaging</title>
    
    <!-- Configuración para convertir la Web en App de Celular -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="COVERT">
    
    <!-- Ícono de la aplicación generado mediante un SVG en código -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23131314'/><path d='M256 80 L380 130 V260 C380 345 326 418 256 440 C186 418 132 345 132 260 V130 Z' fill='none' stroke='%2300e676' stroke-width='24' stroke-linejoin='round'/><path d='M285 200 A 45 45 0 1 0 285 290' fill='none' stroke='%2300b0ff' stroke-width='28' stroke-linecap='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23131314'/><path d='M256 80 L380 130 V260 C380 345 326 418 256 440 C186 418 132 345 132 260 V130 Z' fill='none' stroke='%2300e676' stroke-width='24' stroke-linejoin='round'/><path d='M285 200 A 45 45 0 1 0 285 290' fill='none' stroke='%2300b0ff' stroke-width='28' stroke-linecap='round'/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-zinc-800 p-4 bg-zinc-900/50 backdrop-blur">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <!-- Mini Logo Vectorial en la barra superior -->
                <svg class="w-6 h-6" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <rect width="512" height="512" rx="100" fill="#131314"/>
                    <path d="M256 80 L380 130 V260 C380 345 326 418 256 440 C186 418 132 345 132 260 V130 Z" fill="none" stroke="#00e676" stroke-width="28" stroke-linejoin="round"/>
                    <path d="M285 200 A 45 45 0 1 0 285 290" fill="none" stroke="#00b0ff" stroke-width="32" stroke-linecap="round"/>
                </svg>
                <h1 class="text-xl font-black tracking-wider text-white">COVERT</h1>
            </div>
            <span class="text-xs bg-zinc-800 text-zinc-400 px-2 py-1 rounded border border-zinc-700">v1.3 - Seguro</span>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-6">
        
        <div class="flex bg-zinc-900 p-1 rounded-lg border border-zinc-800">
            <button id="btn-tab-cifrar" class="w-1/2 py-2 text-sm font-medium rounded-md bg-zinc-800 text-white transition shadow" onclick="switchTab('cifrar')">
                Ocultar Mensaje
            </button>
            <button id="btn-tab-descifrar" class="w-1/2 py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-white transition" onclick="switchTab('descifrar')">
                Revelar Mensaje
            </button>
        </div>

        <div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-lg space-y-1">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500">Contraseña del Chat (Llave Privada)</label>
            <input id="chat-password" type="password" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm focus:outline-none focus:border-zinc-600 text-zinc-300 font-mono" placeholder="Ej: clave_obra_2026">
        </div>

        <section id="section-cifrar" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Mensaje Real y Secreto</label>
                <textarea id="mensaje-real" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-zinc-600 resize-none placeholder-zinc-600" placeholder="Escribe lo que quieres camuflar aquí..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Contexto de Fachada</label>
                <select id="contexto-fachada" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-zinc-600 text-zinc-300">
                    <option value="CONSTRUCCION">🛠️ Oficios / Construcción</option>
                    <option value="TRABAJO">💼 Corporativo / Oficina</option>
                    <option value="FAMILIAR">🏠 Familiar / Cotidiano</option>
                </select>
            </div>

            <button onclick="procesarCifrado()" class="w-full bg-white text-black font-semibold text-sm py-3 rounded-lg hover:bg-zinc-200 transition duration-200 shadow-lg">
                Generar Texto Encubierto
            </button>

            <div id="resultado-cifrado-container" class="hidden space-y-2 pt-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400">Texto Listo para Enviar por WhatsApp</label>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300 break-words">
                    <p id="resultado-cifrado-texto" class="select-all bg-zinc-950 p-2 rounded border border-zinc-800 font-mono text-xs text-zinc-400"></p>
                    <button onclick="copiarAlPortapapeles()" class="mt-3 w-full bg-zinc-800 hover:bg-zinc-700 text-xs text-zinc-300 py-2 rounded border border-zinc-700 transition">
                        Copiar Mensaje Completo
                    </button>
                </div>
            </div>
        </section>

        <section id="section-descifrar" class="hidden space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Pegar Mensaje de WhatsApp</label>
                <textarea id="texto-camuflado-input" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-zinc-600 resize-none placeholder-zinc-600" placeholder="Pega el mensaje camuflado completo aquí..."></textarea>
            </div>

            <button onclick="procesarDescifrado()" class="w-full bg-zinc-800 text-white font-semibold text-sm py-3 rounded-lg hover:bg-zinc-700 border border-zinc-700 transition duration-200">
                Revelar Mensaje Real
            </button>

            <div id="resultado-descifrar-container" class="hidden space-y-2 pt-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-emerald-500 font-bold">⚠️ MENSAJE DESENCRIPTADO</label>
                <div class="bg-emerald-950/30 border border-emerald-900/50 rounded-lg p-4 text-sm text-emerald-300 break-words">
                    <p id="resultado-descifrar-texto" class="font-medium"></p>
                </div>
            </div>
        </section>

    </main>

    <footer class="p-4 text-center text-zinc-600 text-xs border-t border-zinc-900">
        Covert Security Labs &copy; 2026. Procesamiento local criptográfico activo.
    </footer>

    <script>
        const PREFIXES = {
            CONSTRUCCION: [
                "Revisando los avances de obra, encontramos que el ", 
                "Confirmado el replanteo, el presupuesto estimado para el ", 
                "De acuerdo a los planos DWG recibidos, el ", 
                "Siguiendo la programación pactada en el cronograma, el "
            ],
            TRABAJO: [
                "Estimado equipo, adjunto el reporte mensual donde el ", 
                "De acuerdo a lo concluido en la última reunión de gerencia, el ", 
                "Para su revisión técnica, el estado analítico indica que el ", 
                "Cumpliendo con los indicadores métricos del trimestre, el "
            ],
            FAMILIAR: [
                "Hola, te cuento que ya todo quedó completamente listo en casa, el ", 
                "Te confirmo que para la reunión de hoy el ", 
                "Hablé con todos y confirmamos que el ", 
                "No olvides pasar por el encargo, recuerda que el "
            ]
        };

        const SUFFIXES = {
            CONSTRUCCION: " requiere revisión urgente del mampuesto y las cantidades finales de material.",
            TRABAJO: " queda bajo evaluación de la junta de control operativo para su aprobación final.",
            FAMILIAR: " ya está organizado y nos vemos allá a la hora acordada."
        };

        function switchTab(tab) {
            const tabCifrar = document.getElementById('btn-tab-cifrar');
            const tabDescifrar = document.getElementById('btn-tab-descifrar');
            const secCifrar = document.getElementById('section-cifrar');
            const secDescifrar = document.getElementById('section-descifrar');

            if (tab === 'cifrar') {
                tabCifrar.className = "w-1/2 py-2 text-sm font-medium rounded-md bg-zinc-800 text-white transition shadow";
                tabDescifrar.className = "w-1/2 py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-white transition";
                secCifrar.classList.remove('hidden');
                secDescifrar.classList.add('hidden');
            } else {
                tabDescifrar.className = "w-1/2 py-2 text-sm font-medium rounded-md bg-zinc-800 text-white transition shadow";
                tabCifrar.className = "w-1/2 py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-white transition";
                secDescifrar.classList.remove('hidden');
                secCifrar.classList.add('hidden');
            }
        }

        function copiarAlPortapapeles() {
            const texto = document.getElementById('resultado-cifrado-texto').innerText;
            navigator.clipboard.writeText(texto);
            alert('¡Mensaje copiado con éxito!');
        }

        function procesarCifrado() {
            const msgReal = document.getElementById('mensaje-real').value;
            const password = document.getElementById('chat-password').value;
            const contexto = document.getElementById('contexto-fachada').value;

            if(!msgReal || !password) return alert('Por favor ingresa el mensaje secreto y la contraseña del chat');
            
            document.getElementById('resultado-cifrado-container').classList.remove('hidden');
            document.getElementById('resultado-cifrado-texto').innerText = "Cifrando de forma segura...";

            try {
                const encrypted = CryptoJS.AES.encrypt(msgReal, password).toString();
                const prefixes = PREFIXES[contexto];
                const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                const suffix = SUFFIXES[contexto];
                
                const msgCamuflado = `${prefix}[ID:${encrypted}]${suffix}`;
                document.getElementById('resultado-cifrado-texto').innerText = msgCamuflado;
            } catch (error) {
                document.getElementById('resultado-cifrado-texto').innerText = "Error al generar el camuflaje local.";
                console.error(error);
            }
        }

        function procesarDescifrado() {
            const textoCamuflado = document.getElementById('texto-camuflado-input').value;
            const password = document.getElementById('chat-password').value;

            if(!textoCamuflado || !password) return alert('Ingresa el texto recibido y la contraseña del chat');

            document.getElementById('resultado-descifrar-container').classList.remove('hidden');
            document.getElementById('resultado-descifrar-texto').innerText = "Removiendo fachada...";

            try {
                const match = textoCamuflado.match(/\[ID:(.*?)\]/);
                if (!match || !match[1]) {
                    document.getElementById('resultado-descifrar-texto').innerText = "❌ Formato inválido. No se detectó ningún mensaje oculto seguro.";
                    return;
                }

                const encryptedBlock = match[1].trim();
                const bytes = CryptoJS.AES.decrypt(encryptedBlock, password);
                const mensajeOriginal = bytes.toString(CryptoJS.enc.Utf8);

                if (!mensajeOriginal) {
                    document.getElementById('resultado-descifrar-texto').innerText = "❌ Contraseña incorrecta o mensaje corrupto. No se pudo revelar.";
                } else {
                    document.getElementById('resultado-descifrar-texto').innerText = mensajeOriginal;
                }
            } catch (error) {
                document.getElementById('resultado-descifrar-texto').innerText = "❌ Error al procesar el descifrado local.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
