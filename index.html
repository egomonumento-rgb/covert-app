<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covert - Invisible Messaging</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="COVERT">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link class="apple-touch-icon" rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col justify-between font-sans selection:bg-zinc-700">

    <header class="border-b border-zinc-800 p-4 bg-zinc-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="logo.png" alt="Logo COVERT" class="w-7 h-7 rounded-md object-cover border border-zinc-800/60 shadow-sm">
                <h1 class="text-xl font-black tracking-wider text-white">COVERT</h1>
            </div>
            <span class="text-xs bg-zinc-800 text-zinc-400 px-2 py-1 rounded border border-zinc-700">v2.0 - Invisible</span>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-5">
        
        <!-- Main Tabs -->
        <div class="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800">
            <button id="btn-tab-cifrar" class="w-1/2 py-2.5 text-sm font-semibold rounded-lg bg-zinc-800 text-white transition shadow" onclick="switchTab('cifrar')">
                Hide Message
            </button>
            <button id="btn-tab-descifrar" class="w-1/2 py-2.5 text-sm font-semibold rounded-lg text-zinc-400 hover:text-white transition" onclick="switchTab('descifrar')">
                Reveal Message
            </button>
        </div>

        <!-- Shared Secret Key -->
        <div class="bg-zinc-900/40 border border-zinc-800 p-3 rounded-xl space-y-1.5">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500">Chat Password (Private Key)</label>
            <input id="chat-password" type="password" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-sm focus:outline-none focus:border-zinc-600 text-zinc-300 font-mono" placeholder="e.g., project_secret_2026">
        </div>

        <!-- ENCRYPT SECTION -->
        <section id="section-cifrar" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Real & Confidential Message</label>
                <textarea id="mensaje-real" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 resize-none placeholder-zinc-700" placeholder="Type the secret message here..."></textarea>
            </div>

            <!-- Mobile Category Quick Selector -->
            <div class="space-y-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400">Select Cover Text Template</label>
                <div class="flex space-x-1.5 bg-zinc-900 p-1 rounded-lg border border-zinc-800 overflow-x-auto">
                    <button onclick="renderFrases('work')" id="cat-work" class="cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md bg-zinc-800 text-white whitespace-nowrap">🏗️ Work</button>
                    <button onclick="renderFrases('transit')" id="cat-transit" class="cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md text-zinc-400 hover:text-white whitespace-nowrap">🚗 Transit</button>
                    <button onclick="renderFrases('casual')" id="cat-casual" class="cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md text-zinc-400 hover:text-white whitespace-nowrap">🛒 Casual</button>
                </div>
                
                <div id="frases-container" class="grid grid-cols-1 gap-2 pt-1 max-h-48 overflow-y-auto">
                    <!-- Injected by JS -->
                </div>
            </div>

            <!-- Output Container -->
            <div id="resultado-cifrado-container" class="hidden space-y-2 pt-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-500">Generated Text (Secret is now invisibly hidden inside)</label>
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 space-y-3">
                    <p id="resultado-cifrado-texto" class="bg-zinc-950 p-3 rounded-lg border border-zinc-800 text-sm text-zinc-300 break-words font-sans"></p>
                    <button onclick="copiarAlPortapapeles()" class="w-full bg-white text-black font-bold text-xs py-2.5 rounded-lg hover:bg-zinc-200 transition shadow">
                        Copy Message Ready for Chat
                    </button>
                </div>
            </div>
        </section>

        <!-- DECRYPT SECTION -->
        <section id="section-descifrar" class="hidden space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Paste Chat Message</label>
                <textarea id="texto-camuflado-input" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 resize-none placeholder-zinc-700" placeholder="Paste the cover text exactly as received..."></textarea>
            </div>

            <button onclick="procesarDescifrado()" class="w-full bg-zinc-800 text-white font-semibold text-sm py-3 rounded-xl hover:bg-zinc-700 border border-zinc-700 transition">
                Extract & Reveal Hidden Message
            </button>

            <div id="resultado-descifrar-container" class="hidden space-y-2 pt-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-emerald-500">⚠️ DECRYPTED MESSAGE</label>
                <div class="bg-emerald-950/20 border border-emerald-900/40 rounded-xl p-4 text-sm text-emerald-400 break-words">
                    <p id="resultado-descifrar-texto" class="font-medium tracking-wide"></p>
                </div>
            </div>
        </section>

    </main>

    <footer class="p-4 text-center text-zinc-600 text-[10px] border-t border-zinc-900 tracking-wider uppercase">
        Covert Labs v2.0 &bull; Local Cryptographic Steganography Active
    </footer>

    <script>
        const FACHADAS_TEMAS = {
            work: [
                "Sure, let me check the project files and get back to you.",
                "We will coordinate with the team first thing tomorrow morning.",
                "The cost estimates are ready, I will send them over this afternoon.",
                "I am waiting for confirmation from the main supplier.",
                "Heading out right now for the site technical review."
            ],
            transit: [
                "Just arriving at the location now.",
                "Sorry for the delay, got caught in heavy traffic.",
                "Driving right now, will give you a call as soon as I arrive.",
                "Just passed the main checkpoint, everything looks clear.",
                "On my way, see you there in about 15 minutes."
            ],
            casual: [
                "Sounds good, I am picking up some milk and bread on my way.",
                "Alright, let's meet up there a bit later.",
                "Okay, noted.",
                "Just finished lunch, heading out now.",
                "What's the plan for dinner tonight?"
            ]
        };

        // Marcadores híbridos alternativos compatibles con el parser de WhatsApp
        // Usamos combinaciones de espacios y el separador de línea invisible \u2028 que WhatsApp respeta
        const ZW_ZERO = '\u2028'; 
        const ZW_ONE = '\u2029';
        const ALT_ZERO = '\u206A';
        const ALT_ONE = '\u206B';

        window.onload = () => { renderFrases('work'); };

        function switchTab(tab) {
            const tabCifrar = document.getElementById('btn-tab-cifrar');
            const tabDescifrar = document.getElementById('btn-tab-descifrar');
            const secCifrar = document.getElementById('section-cifrar');
            const secDescifrar = document.getElementById('section-descifrar');

            if (tab === 'cifrar') {
                tabCifrar.className = "w-1/2 py-2.5 text-sm font-semibold rounded-lg bg-zinc-800 text-white transition shadow";
                tabDescifrar.className = "w-1/2 py-2.5 text-sm font-semibold rounded-lg text-zinc-400 hover:text-white transition";
                secCifrar.classList.remove('hidden');
                secDescifrar.classList.add('hidden');
            } else {
                tabDescifrar.className = "w-1/2 py-2.5 text-sm font-semibold rounded-lg bg-zinc-800 text-white transition shadow";
                tabCifrar.className = "w-1/2 py-2.5 text-sm font-semibold rounded-lg text-zinc-400 hover:text-white transition";
                secDescifrar.classList.remove('hidden');
                secCifrar.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFrases('work');
        });

        function renderFrases(categoria) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md text-zinc-400 hover:text-white whitespace-nowrap";
            });
            
            const targetBtn = document.getElementById(`cat-${categoria}`);
            if (targetBtn) {
                targetBtn.className = "cat-btn flex-1 py-1.5 px-3 text-xs font-medium rounded-md bg-zinc-800 text-white whitespace-nowrap";
            }

            const container = document.getElementById('frases-container');
            if (container) {
                container.innerHTML = '';
                if (FACHADAS_TEMAS[categoria]) {
                    FACHADAS_TEMAS[categoria].forEach(frase => {
                        const btn = document.createElement('button');
                        btn.onclick = () => ejecutarCamuflajeInvisible(frase);
                        btn.className = "w-full text-left bg-zinc-900 hover:bg-zinc-850 border border-zinc-800/80 rounded-lg p-3 text-xs text-zinc-300 transition active:scale-[0.99]";
                        btn.innerText = frase;
                        container.appendChild(btn);
                    });
                }
            }
        }

        function textToInvisible(text) {
            return text.split('').map(char => {
                const binary = char.charCodeAt(0).toString(2).padStart(8, '0');
                return binary.split('').map(bit => bit === '0' ? ZW_ZERO : ZW_ONE).join('');
            }).join('');
        }

        function invisibleToText(zwStr) {
            let cleanBin = '';
            for (let char of zwStr) {
                if (char === ZW_ZERO || char === ALT_ZERO) cleanBin += '0';
                else if (char === ZW_ONE || char === ALT_ONE) cleanBin += '1';
            }
            if (!cleanBin) return '';
            
            const bytes = cleanBin.match(/.{1,8}/g) || [];
            return bytes.map(byte => String.fromCharCode(parseInt(byte, 2))).join('');
        }

        function ejecutarCamuflajeInvisible(fraseFachada) {
            const msgReal = document.getElementById('mensaje-real').value;
            const password = document.getElementById('chat-password').value;

            if(!msgReal || !password) return alert('Please enter both the secret message and the chat password first');

            try {
                const encrypted = CryptoJS.AES.encrypt(msgReal, password).toString();
                const invisibleBlock = textToInvisible(encrypted);
                // Inyectamos un punto imperceptible de quiebre que obliga a WA a respetar el bloque de texto
                const msgFinal = fraseFachada + " " + invisibleBlock;

                document.getElementById('resultado-cifrado-container').classList.remove('hidden');
                document.getElementById('resultado-cifrado-texto').innerText = msgFinal;
                document.getElementById('resultado-cifrado-container').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('Error generating local encryption.');
                console.error(error);
            }
        }

        function procesarDescifrado() {
            let textoCamuflado = document.getElementById('texto-camuflado-input').value;
            const password = document.getElementById('chat-password').value;

            if(!textoCamuflado || !password) return alert('Please enter the received text and the chat password');

            document.getElementById('resultado-descifrar-container').classList.remove('hidden');
            document.getElementById('resultado-descifrar-texto').innerText = "Scanning invisible marks and decrypting...";

            try {
                // Captura todos los posibles marcadores invisibles supervivientes de la transmisión
                const zwMatches = textoCamuflado.split('').filter(char => 
                    char === ZW_ZERO || char === ZW_ONE || char === ALT_ZERO || char === ALT_ONE || 
                    char === '\u200B' || char === '\u200C'
                ).join('');
                
                if (!zwMatches) {
                    document.getElementById('resultado-descifrar-texto').innerText = "❌ No invisible hidden data was found in this text.";
                    return;
                }

                const encryptedBlock = invisibleToText(zwMatches);
                const bytes = CryptoJS.AES.decrypt(encryptedBlock, password);
                const mensajeOriginal = bytes.toString(CryptoJS.enc.Utf8);

                if (!mensajeOriginal) {
                    document.getElementById('resultado-descifrar-texto').innerText = "❌ Incorrect password or corrupted data block.";
                } else {
                    document.getElementById('resultado-descifrar-texto').innerText = mensajeOriginal;
                }
            } catch (error) {
                document.getElementById('resultado-descifrar-texto').innerText = "❌ Critical error extracting hidden data.";
                console.error(error);
            }
        }

        function copiarAlPortapapeles() {
            const texto = document.getElementById('resultado-cifrado-texto').innerText;
            navigator.clipboard.writeText(texto).then(() => {
                alert('Message copied! The secret is invisibly embedded.');
            }).catch(err => {
                alert('Error copying text automatically.');
            });
        }
    </script>
</body>
</html>
